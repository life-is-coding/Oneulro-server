name: Build and Deploy Server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to K3S
      if: github.ref == 'refs/heads/main'
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
      run: |
        # Setup kubeconfig
        echo "$KUBECONFIG_CONTENT" | base64 -d > kubeconfig
        export KUBECONFIG=./kubeconfig

        # Install envsubst
        sudo apt-get update && sudo apt-get install -y gettext-base

        # Set environment variables for substitution
        IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
        export DOCKER_REGISTRY="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
        export IMAGE_TAG="${{ github.sha }}"
        export IMAGE_TAG="${IMAGE_TAG:0:7}"

        # Apply deployment with substituted values
        envsubst < k8s/deployment.yaml | kubectl apply -f -

        # Wait for deployment
        kubectl rollout status deployment/oneulro-server --timeout=5m

        # Cleanup
        rm kubeconfig

    - name: Deployment Summary
      if: github.ref == 'refs/heads/main'
      run: |
        echo "✅ Deployment completed"
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
